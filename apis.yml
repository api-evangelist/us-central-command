description: >-
  US Central Command (CENTCOM) is responsible for overseeing American military operations
  in a vast region that includes the Middle East, Central Asia, and parts of East
  Africa. Its primary mission is to ensure the security and stability of this strategic
  area by deterring and defeating threats from terrorist organizations, rogue states,
  and other adversaries.
