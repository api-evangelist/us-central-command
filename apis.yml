aid: us-central-command
name: US Central Command
description: >-
  US Central Command (CENTCOM) is a unified combatant command of the United States
  Department of Defense responsible for overseeing American military operations across
  a region encompassing the Middle East, Central Asia, and parts of East Africa. Its
  primary mission is to ensure the security and stability of this strategic area by
  deterring and defeating threats from terrorist organizations, rogue states, and other
  adversaries. CENTCOM coordinates joint military operations and exercises, supports
  partner nation capacity building, and maintains operational readiness across its
  area of responsibility spanning 21 countries. Headquartered at MacDill Air Force
  Base in Tampa, Florida, CENTCOM does not currently offer a public developer API.
  Public information is accessible through its official media and press releases portal.
